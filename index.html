<!doctype html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <!--Links CSS-->
    <link
      rel="stylesheet"
      href="css/style.css" />
    <link
      rel="stylesheet"
      href="css/resources.css" />
    <link
      rel="stylesheet"
      href="css/skills.css" />

    <!--Título e Favicon-->
    <title>Carbon Decremental</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon.svg" />

    <!--Metadados para buscadores-->
    <meta
      name="description"
      content="Um jogo incremental com lógica invertida: diminua as emissões de carbono e salve o futuro do nosso planeta." />
    <meta
      name="keywords"
      content="Carbon Decremental, incremental game, idle game, modding tree, tmt, jogo de cliques, sustentabilidade" />
    <meta
      name="author"
      content="Breno Santos Adami, João Vitor Pires" />
    <meta
      name="robots"
      content="index, follow" />

    <!--Metadados OG(Facebook, Discord e WhatsApp)-->
    <meta
      property="og:type"
      content="website" />
    <meta
      property="og:url"
      content="https://carbon-decremental-pearl.vercel.app/" />
    <meta
      property="og:title"
      content="Carbon Decremental — Reduza o carbono na atmosfera" />
    <meta
      property="og:description"
      content="Gerencie recursos, diminua as emissões e salve o futuro do nosso planeta." />
    <meta
      property="og:image"
      content="https://carbon-decremental-pearl.vercel.app/images/og-banner.png" />
  </head>

  <body>
    <header>
      <img
        id="header_logo"
        src="favicon.svg"
        alt="Logo Carbon Decremental" />

      <h1>Carbon Decremental</h1>

      <div id="audio_container">
        <button
          id="music_toggle"
          class="audio-btn">
          🔊 MUSIC: OFF
        </button>
      </div>

      <audio
        id="bg_music"
        loop
        src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </header>

    <main>
      <section id="world_panel">
        <div id="world_map">
          <img
            src="images/world-map.png"
            alt="Mapa Mundi" />
        </div>

        <div id="resources">
          <div class="resource-bar">
            <p class="resource-label">💨 Carbono</p>
            <p
              class="resource-value"
              id="carbon_val">
              426 PPM (38%)
            </p>
            <progress
              id="carbon_bar"
              min="0"
              max="100"
              value="38"></progress>
          </div>

          <div class="resource-bar">
            <p class="resource-label">💵 Dinheiro</p>
            <p
              class="resource-value"
              id="money_val">
              $0 / %5T (0%)
            </p>
            <progress
              id="money_bar"
              min="0"
              max="100"
              value="0"></progress>
          </div>

          <div class="resource-bar">
            <p class="resource-label">🧪 Pesquisa</p>
            <p
              class="resource-value"
              id="research_val">
              0 / 1K pts (0%)
            </p>
            <progress
              id="research_bar"
              min="0"
              max="100"
              value="0"></progress>
          </div>
        </div>
      </section>

      <section id="skills_panel">
        <div class="initial-upgrade-container">
          <h3>Geração de Conhecimento Base</h3>
          <div id="container-inicial"></div>
        </div>

        <div class="branches-wrapper">
          <div
            class="branch-column decarbonization"
            id="branch-decarbonization">
            <h2>🌿 Descarbonização</h2>
            <div
              class="upgrades-list"
              id="list-decarbonization"></div>
          </div>

          <div
            class="branch-column green_economy"
            id="branch-green_economy">
            <h2>💰 Economia Verde</h2>
            <div
              class="upgrades-list"
              id="list-green_economy"></div>
          </div>

          <div
            class="branch-column research_centers"
            id="branch-research_centers">
            <h2>🔬 Centros de Pesquisa</h2>
            <div
              class="upgrades-list"
              id="list-research_centers"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Carbon Decremental &copy; 2026</p>
      <p>
        Desenvolvido por
        <a href="">Breno Santos Adami</a>
        e
        <a href="">João Vitor Pires</a>
      </p>
    </footer>

    <!--Link do JavaScript-->
    <script src="js/state.js"></script>
    <script src="js/skills.js"></script>
  </body>
</html>
