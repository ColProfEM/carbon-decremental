<!doctype html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="css/style.css" />

    <!--Título e Favicon-->
    <title>Carbon Decremental</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon.svg" />

    <!--Metadados para buscadores-->
    <meta
      name="description"
      content="Um jogo incremental com lógica invertida: diminua as emissões de carbono e salve o futuro do nosso planeta." />
    <meta
      name="keywords"
      content="Carbon Decremental, incremental game, idle game, modding tree, tmt, jogo de cliques, sustentabilidade" />
    <meta
      name="author"
      content="Breno Santos Adami, João Vitor Pires" />
    <meta
      name="robots"
      content="index, follow" />

    <!--Metadados OG(Facebook, Discord e WhatsApp)-->
    <meta
      property="og:type"
      content="website" />
    <meta
      property="og:url"
      content="https://carbon-decremental-pearl.vercel.app/" />
    <meta
      property="og:title"
      content="Carbon Decremental — Reduza o carbono na atmosfera" />
    <meta
      property="og:description"
      content="Gerencie recursos, diminua as emissões e salve o futuro do nosso planeta." />
    <meta
      property="og:image"
      content="https://carbon-decremental-pearl.vercel.app/images/og-banner.png" />
  </head>

  <body>
    <header>
      <img
        id="header_logo"
        src="favicon.svg"
        alt="Logo Carbon Decremental" />
      <h1>Carbon Decremental</h1>
    </header>

    <footer>
      <p>Carbon Decremental &copy; 2026</p>
      <p>
        Desenvolvido por
        <a href="">Breno Santos Adami</a>
        e
        <a href="">João Vitor Pires</a>
      </p>
    </footer>
  </body>
</html>
